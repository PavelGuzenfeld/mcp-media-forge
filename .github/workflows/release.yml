name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: PavelGuzenfeld/standard/.github/workflows/auto-release.yml@main
    secrets:
      app_id: ${{ secrets.RELEASE_APP_ID }}
      app_private_key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
